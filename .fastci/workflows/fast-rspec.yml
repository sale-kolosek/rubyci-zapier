name: RSpec Tests

on:
  push:
    branches:
      - '**'

jobs:
  setup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.5'
          bundler-cache: true

  test:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ci_node_index: [0]
        ci_node_total: [1]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rubyci_homepage_test
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      RAILS_ENV: test
      DB_ADAPTER: postgresql
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      DB_HOST: postgres

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        id: setup-ruby
        continue-on-error: true
        with:
          ruby-version: '3.3.5'
          bundler-cache: true

      - name: Retry Set up Ruby
        if: steps.setup-ruby.outcome == 'failure'
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3.5'
          bundler-cache: true

      - name: Set up database
        run: bin/rails db:create db:schema:load

      - name: Split and run RSpec
        run: |
          FILES=$(find spec -name '*_spec.rb' | sort | awk "NR % ${{ matrix.ci_node_total }} == ${{ matrix.ci_node_index }}")
          echo "Running: $FILES"
          bundle exec rspec $FILES
